{% extends 'base.html' %}

{% block title %}Add new journey{% endblock %}


{% block content %}
<div class="container mt-4">
    <h2>
        Add a New Journey
    </h2>

    <form id="journeyAdd_form" name="journeyAdd_form"  method="POST">
        <div class="row justify-content-center row-cols-1 row-cols-sm-1 row-cols-md-1 row-cols-lg-1 g-4 pt-3">
            <div class="col">
                <label for="title" class="form-label">Title</label>
                <input type="text" class="form-control{% if title_error %} is-invalid{% endif %}" id="title" name="title" value="{{ request.form['title'] if request.method == 'POST' else '' }}" required>
                <div class="invalid-feedback">{{ title_error }}</div>
            </div>

            <div class="col">
                <label for="description" class="form-label">Description</label>
                <textarea rows="4" class="form-control{% if description_error %} is-invalid{% endif %}" id="description" name="description" value="{{ request.form['description'] if request.method == 'POST' else '' }}" required>{{ request.form['description'] if request.method == 'POST' else '' }}</textarea>
                <div class="invalid-feedback">{{ description_error }}</div>
            </div>

            <div class="col">
                <div class="row">
                    <div class="col-12 col-lg">
                        <label for="startDate" class="form-label">Start Date</label>
                        <input type="date" class="form-control{% if startDate_error %} is-invalid{% endif %}" id="startDate" name="startDate" value="{{ request.form['startDate'] if request.method == 'POST' else '' }}" required>
                        <div class="invalid-feedback">{{ startDate_error }}</div>
                    </div>
                    <div class="col-12 col-lg">
                        <label for="status" class="form-label">Journey Publicity</label>
                        <select title="status" class="form-select form-control{% if publicity_error %} is-invalid{% endif %}" name="status">
                          <option value="private" {{'selected' if status == 'private'}}>Private</option>
                          <option value="public" {{'selected' if status == 'public'}}>Public</option>
                          <option value="published" {{'selected' if status == 'published'}}>Published (Premium only)</option>
                        </select>
                        <div class="invalid-feedback">{{ publicity_error }}</div>
                    </div>
                </div>
            </div>

            <div class="col text-end">
                <button type="submit" class="btn btn-primary" name="action" value="submit">Submit</button>
                <a class="btn btn-primary" href="{{ url_for('my_journeys') }}">Cancel</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
