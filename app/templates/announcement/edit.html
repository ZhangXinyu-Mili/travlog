{% extends "base.html" %}
{% block title %}Edit Announcement{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex align-items-center">
        <h2 class="me-2">Edit Announcement</h2>
    </div>
    <form method="post">
        <input type="hidden" name="status" value="{{ status }}">
        <div class="row row-cols-1 pt-3 g-4">
            <div class="col">
                <label for="title" class="form-label">Title</label>
                <input type="text" id="title" name="title" class="form-control {% if title_error %} is-invalid{% endif %}" value="{{ title }}" required>
                <div class="invalid-feedback">{{ title_error }}</div>
            </div>
            <div class="col">
                <label for="content" class="form-label">Content</label>
                <textarea id="content" name="content" class="form-control {% if content_error %} is-invalid{% endif %}" rows="5" required>{{ content }}</textarea>
                <div class="invalid-feedback">{{ content_error }}</div>
            </div>
            <div class="col text-end">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{{ url_for('list_announcements') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
