{% extends "base.html" %}
{% block title %}Edit Profile Form{% endblock %}
{% block content %}
<div class="h-100 row align-items-center justify-content-center">
  <div class="col-12 col-lg-8">
    <div class="text-start">
      <h2 class="p-3 m-0">Edit Profile</h2>
    </div>
    <div class="container">
      <form method="POST" action="{{ url_for('edit_my_profile') }}" class="needs-validation"  enctype="multipart/form-data">
        <div class="column align-items-center">

          <div class="text-center">
            <img src="{{ user_profile_image(user) }}" alt="Profile Image" class="img-fluid rounded" style="max-width: 150px;">
            <div class="column text-start">
              <label class="form-label">Add or Update Photo</label>
              <input type="file" id="profile_image" name="profile_image" class="form-control mt-2" accept=".jpg,.jpeg,.png">
            </div>
          </div>

          <br />

          <div class="text-start">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control{% if err_msgs['username'] %} is-invalid{% endif %}" value="{{ user.username }}" required>
              <div class="invalid-feedback">{{ err_msgs['username'] }}</div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">First Name</label>
                <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
              </div>
            </div>


            <div class="form-group mt-3">
                <div class="d-flex align-items-center">
                    <!-- Checkbox to name_public -->
                    <div class="form-check">
                        <label for="name_public" class="form-check-label">Keep your real name public?</label>
                        <input type="checkbox" id="name_public" name="name_public" class="form-check-input" {% if user.name_public %}checked{% endif %}>

                    </div>
                </div>
            </div>


            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control{% if err_msgs['email'] %} is-invalid{% endif %}" value="{{ user.email }}" required>
              <div class="invalid-feedback">{{ err_msgs['email'] }}</div>
            </div>

            <div class="form-group mt-3">
                <div class="d-flex align-items-center">
                    <!-- Checkbox to email_public -->
                    <div class="form-check">
                        <label for="email_public" class="form-check-label">Keep your email public?</label>
                        <input type="checkbox" id="email_public" name="email_public" class="form-check-input" {% if user.email_public %}checked{% endif %}>

                    </div>
                </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Location</label>
              <input type="text" name="location" class="form-control" value="{{ user.location }}">
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea name="description" class="form-control" rows="3">{{ user.description }}</textarea>
            </div>

            <div class="form-group mt-3">
                <div class="d-flex align-items-center">
                    <!-- Checkbox to profile_public -->
                    <div class="form-check">
                        <label for="profile_public" class="form-check-label">Keep your profile public?</label>
                        <input type="checkbox" id="profile_public" name="profile_public" class="form-check-input" {% if user.profile_public %}checked{% endif %}>
                    </div>
                </div>
            </div>

            <div class="form-group mt-3">
                <div class="d-flex align-items-center">
                    <div class="form-check">
                        <label for="places_public" class="form-check-label">Keep "Places I've Been" public?</label>
                        <input type="checkbox" id="places_public" name="places_public" class="form-check-input" {% if user.places_public %}checked{% endif %}>
                    </div>
                </div>
            </div>

            <div class="form-group mt-3">
                <div class="d-flex align-items-center">
                    <div class="form-check">
                        <label for="likes_public" class="form-check-label">Keep your "Likes" public?</label>
                        <input type="checkbox" id="likes_public" name="likes_public" class="form-check-input" {% if user.likes_public %}checked{% endif %}>
                    </div>
                </div>
            </div>

            <div class="form-group mt-3">
                <div class="d-flex align-items-center">
                    <div class="form-check">
                        <label for="comments_public" class="form-check-label">Keep your "comments" public?</label>
                        <input type="checkbox" id="comments_public" name="comments_public" class="form-check-input" {% if user.comments_public %}checked{% endif %}>
                    </div>
                </div>
            </div>

          </div>
        </div>

        <div class="text-end">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{{ url_for('remove_profile_image') }}" class="btn btn-primary">Remove Profile Image</a>
          <a href="{{ url_for('view_my_profile') }}" class="btn btn-primary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
