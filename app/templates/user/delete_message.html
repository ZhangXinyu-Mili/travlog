<div class="modal-dialog">
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Delete Event</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <p>Do you want to delete this message: <strong>Sent by {{user.first_name}} {{user.last_name}}</strong>?</p>
        </div>
        <div class="modal-footer">
            <form action="{{url_for('delete_message', message_id=message_id)}}" method="post">
                <input id="from" type="hidden" name="from_id" class="form-control" value="{{from_id}}">
                <input id="from_name" type="hidden" name="from_name" class="form-control" value="{{from_name}}">
                <button type="submit" class="btn btn-primary">Confirm</button>
            </form>
            <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Cancel</button>
        </div>
    </div>
</div>
