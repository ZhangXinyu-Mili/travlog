{% extends "base.html" %}
{% block title %}Reset Passwrod{% endblock %}
{% block content %}
  <div class="h-100 row align-items-center justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="text-center">
        <h2 class="p-3 m-0">Reset Password</h2>
      </div>
      <div class="container">
        <form action="{{ url_for('reset_password') }}" method="post">
          <div class="column">
            <div class="mb-3 col-lg col-12">
              <label for="password" class="form-label">Current Password</label>
              <input type="password" class="form-control{% if err_msgs['current_password'] %} is-invalid{% endif %}" id="current_password" name="current_password" placeholder="Enter your current password..." required>
              <div class="invalid-feedback">{{ err_msgs['current_password'] }}</div>
            </div>

            <div class="mb-3 col-lg col-12">
              <label for="password" class="form-label">New Password</label>
              <input type="password" class="form-control{% if err_msgs['new_password'] %} is-invalid{% endif %}" id="new_password" name="new_password" placeholder="Enter your new password..." required>
              <div class="invalid-feedback">{{ err_msgs['new_password'] }}</div>
            </div>

            <div class="mb-3 col-lg col-12">
              <label for="password_confirmation" class="form-label">New Password Confirmation</label>
              <input type="password" class="form-control{% if err_msgs['new_password_confirmation'] %} is-invalid{% endif %}" id="new_password_confirmation" name="new_password_confirmation" placeholder="Confirm your new password..." required>
              <div class="invalid-feedback">{{ err_msgs['new_password_confirmation'] }}</div>
            </div>
          </div>

          <div class="text-end">
            <button type="submit" class="btn btn-primary">Submit</button>
            <a href="{{ url_for('view_my_profile') }}" class="btn btn-primary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
